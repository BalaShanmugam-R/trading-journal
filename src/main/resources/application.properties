spring.application.name=journal

#postgres properties
spring.datasource.url=jdbc:postgresql://localhost:5433/postgres?currentSchema=tradingjournal
spring.datasource.username=postgres
spring.datasource.password=1234
#spring.jpa.properties.hibernate.default_schema=tradingjournal
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.show-sql=true
logging.level.org.springframework.data.repository.config=DEBUG
logging.level.org.springframework.boot.autoconfigure.data=DEBUG


